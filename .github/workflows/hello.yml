name: My First Workflow

on: push

jobs:
  lint: 
    runs-on: ubuntu-latest

    steps:
      - name: checkout code 
        uses: actions/checkout@v4
        
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: "npm"
      - name: check node version
        run: node -v
      - name: download dependency
        run: npm i

      - name: Lint code
        run: npm run lint
      - name: linttttt 
        run: echo "Yes am here"
  test:
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: checkout code #setup project /clon
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: run test
        run: npm run test  
      - name: download dependency
        run: npm i
      
  build: 
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: checkout code 
        uses: actions/checkout@v4
      - name: Setup node
        uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: build running
        run: echo "yesss"